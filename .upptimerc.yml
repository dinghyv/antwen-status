# ==========================================
# 基础信息配置
# ==========================================
owner: dinghyv
repo: antwen-status

# ==========================================
# 监控目标配置（仅保留 HTTPS 域名监控）
# ==========================================
sites:
  - name: 🌐 主站 - GTA数据库
    url: https://www.antwen.cn
    method: GET

  - name: 📝 DINGHY 博客静态页
    url: https://blog.antwen.cn
    method: GET

  - name: 🤖 大模型中转站 (CPA)
    url: https://cpa.antwen.cn
    method: GET

# ==========================================
# 状态页外观与安全展示配置
# ==========================================
status-website:
  # 使用默认的 github.io 访问，防止域名解析故障时无法查看
  baseUrl: /antwen-status
  # cname: status.antwen.cn # 保持注释
  
  # 🔒 开启隐私模式：这会隐藏所有监控项的真实 URL 网址，公开状态页上只显示上面定义的 name 
  secretUrls: true

  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: "Antwen 服务状态监控中心"
  introTitle: "**Antwen** 站点实时运行状态"
  introMessage: "本页面自动监测核心域名的连通性与响应延迟。数据由 GitHub Actions 提供，每 5 分钟自动更新一次。"
  
  navbar:
    - title: 运行状态
      href: /
    - title: 主站
      href: https://www.antwen.cn
    - title: 博客
      href: https://blog.antwen.cn
